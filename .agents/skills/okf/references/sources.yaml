version: 2

normative_sources:
  - id: okf-spec
    url: https://okf.md/spec/

reference_sources:
  - id: okf-demo-catalog
    repository: GoogleCloudPlatform/knowledge-catalog
    paths:
      - toolbox/mdcode/demo/okf/catalog

primary_sources:
  - id: crossplane
    repository: crossplane/crossplane
    kind: crossplane-core
    release_policy: latest-stable
    research_profiles:
      core-crds:
        agent: okf-crossplane-core-code-researcher
        paths:
          - cluster/crds
        legacy_exclusions:
          - Claims and claim APIs
          - deprecated CompositeResourceDefinition v1 schema
          - legacy v1 composite-resource semantics
  - id: crossplane-cli
    repository: crossplane/cli
    kind: cli
    domain: crossplane-cli
    core_scope: false
  - id: crossplane-runtime
    repository: crossplane/crossplane-runtime
    kind: provider-sdk
  - id: crossplane-tools
    repository: crossplane/crossplane-tools
    kind: development-tools
  - id: function-sdk-go
    repository: crossplane/function-sdk-go
    kind: function-sdk
  - id: function-kro
    repository: crossplane-contrib/function-kro
    kind: function
  - id: function-go-templating
    repository: crossplane-contrib/function-go-templating
    kind: function
    audience: user
    release_policy: discover-highest-stable-semver-tag
    agent_set:
      primary: okf-function-go-templating-researcher
      sprig: okf-function-go-templating-sprig-researcher
    paths:
      - README.md
      - example
      - package/input/gotemplating.fn.crossplane.io_gotemplates.yaml
      - function_maps.go
      - go.mod
    supporting_sources:
      - sprig
    legacy_exclusions:
      - README section v1 Composite Resources (Legacy)
      - examples requiring Claims or claim references
      - examples requiring deprecated v1 XRD or legacy v1 XR semantics
  - id: xprin
    repository: crossplane-contrib/xprin
    kind: composition-test-tool
  - id: function-sequencer
    repository: crossplane-contrib/function-sequencer
    kind: function
  - id: function-auto-ready
    repository: crossplane-contrib/function-auto-ready
    kind: function
  - id: provider-kubernetes
    repository: crossplane-contrib/provider-kubernetes
    kind: native-provider
  - id: provider-helm
    repository: crossplane-contrib/provider-helm
    kind: native-provider
  - id: function-patch-and-transform
    repository: crossplane-contrib/function-patch-and-transform
    kind: function
  - id: provider-upjet-aws
    repository: crossplane-contrib/provider-upjet-aws
    kind: upjet-provider
    terraform_source: terraform-provider-aws
  - id: provider-upjet-azure
    repository: crossplane-contrib/provider-upjet-azure
    kind: upjet-provider
    terraform_source: terraform-provider-azurerm
  - id: function-tag-manager
    repository: crossplane-contrib/function-tag-manager
    kind: function

documentation_sources:
  - id: crossplane-docs
    repository: crossplane/docs
    kind: official-documentation
    agent: okf-crossplane-core-docs-researcher
    release_policy: match-latest-stable-crossplane-major-minor
    path_template: content/v{major}.{minor}
    exclude_paths:
      - content/master
      - content/cli
      - content/v1.*
    focus:
      - composition
      - managed-resources
      - operations
      - packages/providers
      - packages/functions
      - release-cycle
      - feature-lifecycle
    legacy_exclusions:
      - Claims and claim workflows
      - v1 Composite Resources (Legacy)
      - deprecated CompositeResourceDefinition v1 schema
      - v1-to-v2 migration guidance unless explicitly requested
    version_scope: current-stable-v2

supporting_sources:
  - id: sprig
    repository: Masterminds/sprig
    kind: template-function-library
    authority: supporting
    version_policy: exact-version-from-selected-function-go-templating-go-mod
    agent: okf-function-go-templating-sprig-researcher
    paths:
      - README.md
      - docs
    availability_source: function-go-templating/function_maps.go
  - id: upjet
    repository: crossplane/upjet
    kind: upjet-framework
  - id: terraform-provider-aws
    repository: hashicorp/terraform-provider-aws
    kind: terraform-provider
    documentation: https://registry.terraform.io/providers/hashicorp/aws/latest/docs
  - id: terraform-provider-azurerm
    repository: hashicorp/terraform-provider-azurerm
    kind: terraform-provider
    documentation: https://registry.terraform.io/providers/hashicorp/azurerm/latest/docs

example_sources:
  - id: homelab-idp-crossplane-compositions
    repository: 0xayf/homelab-idp
    kind: crossplane-compositions
    origin: third-party
    authority: illustrative
    paths:
      - platform-core/controlplane/crossplane-compositions
    usage: summarize-and-cite

source_policy:
  pin_commits: true
  prefer_primary_sources: true
  allow_unpinned_citations: false
  allow_name_only_upjet_mapping: false
  third_party_examples_can_define_behavior: false
  third_party_examples_require_corroboration: true
  verify_license_before_copying: true
  resolve_current_stable_release_before_core_research: true
  resolve_current_stable_release_before_function_research: true
  stable_release_definition: highest-semver-tag-excluding-draft-prerelease-rc-beta-alpha
  allow_function_main_fallback: false
  infer_feature_state_from_api_version: false
  exclude_legacy_claims: true
  exclude_deprecated_xrd_v1: true
  treat_all_v1_api_versions_as_legacy: false
  require_dedicated_agent_set_per_function: true
